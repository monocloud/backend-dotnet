name: Test Report

on:
  workflow_run:
    workflows: ["Build & Test"]
    types:
      - completed

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  report:
    name: Publish Test Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write
    if: >
      github.event.workflow_run.event == 'pull_request' ||
      github.event.workflow_run.event == 'push'
    steps:
      - name: Publish Backend SDK Unit Tests
        uses: dorny/test-reporter@v3
        with:
          artifact: MonoCloud.Backend.Tests
          name: "Backend SDK Unit Tests"
          path: "**/*.trx"
          reporter: dotnet-trx
          fail-on-error: false
