name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Projects
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x.x

      - name: Restore Packages
        run: dotnet restore --nologo

      - name: Build
        run: dotnet build --no-restore --nologo --configuration Release

      - name: Cache Build
        uses: actions/cache/save@v6
        with:
          path: .
          key: build-${{ github.run_id }}-${{ github.run_attempt }}

  lint-dotnet:
    name: Lint DotNet
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x.x

      - name: Install Tool
        run: dotnet tool restore || true

      - name: Lint DotNet
        id: lint_dotnet
        run: |
          dotnet format --verify-no-changes

  test:
    name: Backend SDK Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x.x

      - name: Load Cache
        uses: actions/cache/restore@v6
        with:
          path: .
          key: build-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Test
        run: dotnet test MonoCloud.Backend.Tests/MonoCloud.Backend.Tests.csproj --no-build --nologo --configuration Release --logger "trx;LogFileName=MonoCloud.Backend.Tests.trx"

      - name: Upload test results
        id: upload_artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: MonoCloud.Backend.Tests
          path: "**/*.trx"
          overwrite: true
